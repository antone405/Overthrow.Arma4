name: Build Custom Overthrow Mod

on:
  push:
    branches: [ "main", "Patch-1" ]
  pull_request:
    branches: [ "main", "Patch-1" ]
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Note: If your mod depends on core vanilla assets to compile, 
    # you may need to bring down unpacked engine headers, though pure script mods often skip this.
    
    - name: Compile and Package Mod
      shell: pwsh
      run: |
        # 1. Create a workspace output directory completely outside of the repository root
        New-Item -ItemType Directory -Force -Path "..\build_output"
        
        # 2. Compress the root repository folder, but specifically exclude the .git metadata
        Compress-Archive -Path ".\*" -DestinationPath "..\build_output\Overthrow_Custom_Build.zip"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: custom-overthrow-package
        # 3. Pull the artifact from the clean external directory
        path: ..\build_output\
